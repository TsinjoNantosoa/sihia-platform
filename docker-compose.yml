services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sihia
      POSTGRES_PASSWORD: sihia
      POSTGRES_DB: sihia
    ports:
      # 5434 évite le conflit avec PostgreSQL Windows (souvent sur 5432)
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sihia -d sihia"]
      interval: 3s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@sihia.health}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev-docker-secret-minimum-32-chars}
      ENVIRONMENT: development
      CORS_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
      DATABASE_URL: postgresql://sihia:sihia@postgres:5432/sihia
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "8080:8080"
    depends_on:
      - backend

  airflow:
    profiles: [airflow]
    image: apache/airflow:2.9.3-python3.12
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      DATABASE_URL: postgresql://sihia:sihia@postgres:5432/sihia
      SIHIA_BACKEND_DIR: /opt/sihia/backend
      PIPELINE_IMPORT_DIR: /opt/sihia/data/imports
      PYTHONPATH: /opt/sihia/backend
      _PIP_ADDITIONAL_REQUIREMENTS: pg8000 psycopg2-binary sqlalchemy pydantic python-dotenv
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./backend:/opt/sihia/backend
      - ./data:/opt/sihia/data
      - airflow_home:/opt/airflow
    ports:
      - "${AIRFLOW_PORT:-8081}:8080"
    command: standalone
    depends_on:
      postgres:
        condition: service_healthy

  mailhog:
    profiles: [mailhog]
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pg_data:
  pgadmin_data:
  airflow_home:
